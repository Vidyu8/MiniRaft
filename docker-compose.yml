version: "3.8"

services:
  gateway:
    image: node:20-alpine
    container_name: gateway
    working_dir: /app
    volumes:
      - ./gateway:/app
      - ./frontend:/app/public
    command: sh -c "npm install && npx nodemon --legacy-watch index.js"
    ports:
      - "3000:3000"
    tty: true
    stdin_open: true
    networks:
      - raft-network

  replica1:
    image: node:20-alpine
    container_name: replica1
    working_dir: /app
    volumes:
      - ./replica1:/app
    command: sh -c "npm install && npx nodemon --legacy-watch index.js"
    environment:
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=replica2:4002,replica3:4003
      - GATEWAY_URL=http://gateway:3000
    ports:
      - "4001:4001"
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - raft-network

  replica2:
    image: node:20-alpine
    container_name: replica2
    working_dir: /app
    volumes:
      - ./replica2:/app
    command: sh -c "npm install && npx nodemon --legacy-watch index.js"
    environment:
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=replica1:4001,replica3:4003
      - GATEWAY_URL=http://gateway:3000
    ports:
      - "4002:4002"
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4002/health"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - raft-network

  replica3:
    image: node:20-alpine
    container_name: replica3
    working_dir: /app
    volumes:
      - ./replica3:/app
    command: sh -c "npm install && npx nodemon --legacy-watch index.js"
    environment:
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=replica1:4001,replica2:4002
      - GATEWAY_URL=http://gateway:3000
    ports:
      - "4003:4003"
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4003/health"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - raft-network

networks:
  raft-network:
    driver: bridge

