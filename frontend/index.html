<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Drawing Board (RAFT)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Real-Time Distributed Drawing Board</h1>
            <div class="status-panel">
                <div class="status-indicator" id="ws-status">
                    <span class="dot"></span> Connection: Connecting...
                </div>
                <div class="status-indicator" id="leader-status">
                    <span class="badge">Current Leader: <span id="leader-id">Unknown</span></span>
                </div>
            </div>
        </header>

        <main class="canvas-container">
            <canvas id="drawing-board" width="1000" height="600"></canvas>
            <div class="controls">
                <button id="clear-btn">Clear Canvas (Local)</button>
                <div class="color-picker">
                    <label>Color:</label>
                    <input type="color" id="stroke-color" value="#ffffff">
                </div>
                <div class="brush-size">
                    <label>Size:</label>
                    <input type="range" id="stroke-size" min="1" max="20" value="3">
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by Mini-RAFT Consensus &bull; Zero-Downtime Deployment</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
